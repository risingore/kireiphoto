# Dependabot configuration — kireiphoto.
#
# Bun lockfile (bun.lock) を更新するため、`package-ecosystem: "bun"` を
# 使用する。Bun は現状 Dependabot の beta ecosystem 扱いのため
# `enable-beta-ecosystems: true` が必要。
#
# `open-pull-requests-limit` を低めに保つことで、メンテ可能な PR 数に抑える。

version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
