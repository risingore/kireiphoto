# Dependabot configuration — kima-core baseline.
#
#派生テンプレートに sync-to-derivatives.sh で配布される。
# 派生プロジェクト (派生テンプレを cp して作るもの) では、必要に応じて
# package-ecosystem を切り替えること:
#   - JS / TS / Bun: "npm"  ← 既定 (Bun は package.json を読むので npm 互換)
#   - Python / uv:   "pip"  ← python-template 派生では切り替え
#   - GitHub Actions: 共通 (両方有効化)
#
# `open-pull-requests-limit` を低めに保つことで、メンテ可能な PR 数に抑える。

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
