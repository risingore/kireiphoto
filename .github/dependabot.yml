# Dependabot configuration — kima-core baseline.
#
# このファイルは kima-core 正本のテンプレ。sync-to-derivatives.sh が
# 各派生プロジェクトに配布する際、ECOSYSTEMS 連想配列を参照して
# `package-ecosystem` を以下のように書き換える:
#
#   ECOSYSTEMS["..."]="bun" → package-ecosystem: "bun" + enable-beta-ecosystems: true
#   ECOSYSTEMS["..."]="pip" → package-ecosystem: "pip"
#   それ以外                → package-ecosystem: "npm" のまま (汎用デフォルト)
#
# 派生プロジェクト側でこのファイルを直接編集しても、次回 kima-core sync 時に
# ECOSYSTEMS マップに従って上書きされる。新しいテンプレ／実プロジェクトを
# 追加する場合は sync-to-derivatives.sh の DERIVATIVES と ECOSYSTEMS に
# 1 行追加すれば自動的に正しい dependabot.yml が配布される。
#
# `open-pull-requests-limit` を低めに保つことで、メンテ可能な PR 数に抑える。

version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
